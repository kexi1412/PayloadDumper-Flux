name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v -keystore release.jks \
            -storepass android -keypass android -alias flux \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Payload Dumper Flux, OU=Flux, O=Flux, L=City, S=State, C=CN"

      - name: Zipalign and sign
        run: |
          set -e
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          echo "Using build-tools: $BT"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          "$BT/zipalign" -p -f 4 "$UNSIGNED" app-release-aligned.apk
          "$BT/apksigner" sign \
            --ks release.jks --ks-pass pass:android --key-pass pass:android \
            --out PayloadDumper-Flux-release.apk app-release-aligned.apk
          "$BT/apksigner" verify --verbose PayloadDumper-Flux-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayloadDumper-Flux-apk
          path: PayloadDumper-Flux-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Payload Dumper Flux build ${{ github.run_number }}
          files: PayloadDumper-Flux-release.apk
          generate_release_notes: true
